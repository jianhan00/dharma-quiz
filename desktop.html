<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />

<title>線上刷題小程序（桌機版含搜尋）</title>

<style>
:root{
  --bg:#f6f7fb;--card:#fff;--ink:#0f172a;--muted:#64748b;
  --brand:#3b82f6;--ok:#16a34a;--bad:#ef4444;--line:#e5e7eb
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,"Noto Sans TC",sans-serif;
  background:var(--bg);color:var(--ink)
}
.wrap{max-width:1100px;margin:24px auto;padding:0 16px}
.card{
  background:var(--card);border:1px solid var(--line);
  border-radius:16px;box-shadow:0 10px 30px rgba(15,23,42,.06);
  padding:18px
}
h1{margin:0 0 8px;font-size:40px}
.sub{color:var(--muted);font-size:14px}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}

button,select{
  border:1px solid var(--line);border-radius:10px;
  padding:12px 14px;background:#fff;
  color:var(--ink);font-size:18px;cursor:pointer
}
.btn.brand{background:var(--brand);border-color:var(--brand);color:#fff}
.btn.ghost{background:#fff}

.badge{
  background:#f1f5f9;border:1px solid var(--line);
  border-radius:12px;padding:10px 14px;font-size:18px
}
.hr{height:1px;background:var(--line);margin:14px 0}

.question{font-size:32px;line-height:1.7;margin:8px 0 10px}
.opt{
  display:flex;align-items:flex-start;gap:12px;
  border:1px solid var(--line);border-radius:12px;
  padding:12px;margin:8px 0;font-size:26px;
  background:#fff;cursor:pointer
}
.opt input{transform:scale(1.2);margin-top:4px}
.opt.correct{border-color:var(--ok);background:#f0fdf4}
.opt.wrong{border-color:var(--bad);background:#fef2f2}

.feedback{
  margin-top:10px;border:1px solid var(--line);
  border-radius:10px;padding:12px;font-size:20px;
  background:#f8fafc
}
.feedback.ok{color:var(--ok)}
.feedback.bad{color:var(--bad)}

.nav{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
.hidden{display:none}

/* ===== 搜尋區 ===== */
.searchBox{border:1px solid var(--line);border-radius:14px;background:#fff;padding:14px}
.searchInput{
  flex:1;min-width:320px;font-size:20px;
  padding:12px 14px;border:1px solid var(--line);
  border-radius:10px
}
.searchInfo{font-size:14px;color:var(--muted)}
.resultItem{
  border:1px solid var(--line);border-radius:14px;
  padding:14px;margin:10px 0;background:#fff
}
.resultQ{font-size:22px;font-weight:700}
.resultMeta{font-size:14px;color:var(--muted)}
.resultSmall{font-size:18px;line-height:1.7}
mark{background:#fde68a}
</style>
</head>

<body>
<div class="wrap">

  <div class="card">
    <h1>線上刷題小程序 <span class="sub">— 桌機版（關鍵字搜尋）</span></h1>
  </div>

  <!-- 搜尋區 -->
  <div class="card searchBox" id="search-card" style="display:none;margin-top:14px">
    <div class="row">
      <b>搜尋：</b>
      <select id="searchScope"></select>
      <input id="searchInput" class="searchInput" placeholder="輸入關鍵字（題目／選項／解析）">
      <button id="searchBtn" class="btn brand">搜尋</button>
      <button id="searchClearBtn" class="btn ghost">清除</button>
      <button id="searchPracticeBtn" class="btn brand" style="display:none">
        用搜尋結果開始練習
      </button>
    </div>
    <div class="searchInfo" id="searchInfo" style="margin-top:6px"></div>
    <div id="searchResults"></div>
  </div>

  <!-- 刷題區 -->
  <div class="card" id="panel-student" style="margin-top:14px">載入題庫中...</div>

</div>

<script>
const $=s=>document.querySelector(s);
let BANK=[],SECTIONS=[],LAST_HITS=[];

/* ========= 初始化 ========= */
async function init(){
  const r=await fetch('questions.json?t='+Date.now(),{cache:'no-store'});
  BANK=await r.json();
  SECTIONS=[...new Set(BANK.map(q=>q.section||'未分類'))];
  mountStudent('#panel-student');
  initSearch();
}
init();

/* ========= 搜尋 ========= */
function initSearch(){
  $('#search-card').style.display='';
  $('#searchScope').innerHTML=
    '<option value="__all__">全部章節</option>'+
    SECTIONS.map(s=>`<option value="${s}">只搜：${s}</option>`).join('');
  $('#searchBtn').onclick=doSearch;
  $('#searchClearBtn').onclick=clearSearch;
  $('#searchPracticeBtn').onclick=startPracticeFromHitList;
}

function clearSearch(){
  $('#searchInput').value='';
  $('#searchResults').innerHTML='';
  $('#searchInfo').textContent='';
  LAST_HITS=[];
  $('#searchPracticeBtn').style.display='none';
}

function doSearch(){
  const kw=$('#searchInput').value.trim().toLowerCase();
  const scope=$('#searchScope').value;
  if(!kw)return;
  const hits=[];
  BANK.forEach((q,i)=>{
    if(scope!=='__all__'&&(q.section||'未分類')!==scope)return;
    const text=[q.question,...(q.options||[]),q.explanation||''].join(' ').toLowerCase();
    if(text.includes(kw))hits.push(i);
  });
  LAST_HITS=hits;
  $('#searchPracticeBtn').style.display=hits.length?'':'none';
  $('#searchInfo').textContent=`找到 ${hits.length} 題`;
  $('#searchResults').innerHTML=hits.map(i=>`
    <div class="resultItem">
      <div class="resultQ">${BANK[i].question}</div>
      <div class="resultMeta">章節：${BANK[i].section||'未分類'}</div>
      <div class="resultSmall">${(BANK[i].options||[]).join(' / ')}</div>
    </div>`).join('');
}

/* ========= 用搜尋結果組卷 ========= */
function startPracticeFromHitList(){
  const root=$('#panel-student');
  const st=root._state;
  st.paper=[...LAST_HITS];
  st.idx=0;st.right=0;st.user={};st.revealed={};st.firstScored={};
  root.querySelector('.s-finish').disabled=false;
  root.querySelector('.s-nav').classList.remove('hidden');
  render(root);
  root.scrollIntoView({behavior:'smooth'});
}

/* ========= 原刷題核心（未動邏輯） ========= */
function mountStudent(sel){
  const el=$(sel);
  el.innerHTML=`
    <div class="row">
      <div class="badge">共 ${BANK.length} 題</div>
      <div class="badge">進度 <span class="s-progress">0/0</span></div>
      <div class="badge">答對 <span class="s-right">0</span></div>
    </div>
    <div class="hr"></div>
    <div class="question s-q"></div>
    <div class="s-optBox"></div>
    <div class="feedback s-fb hidden"></div>
    <div class="nav hidden s-nav">
      <button class="btn s-prev">← 上一題</button>
      <button class="btn s-next">下一題 →</button>
      <button class="btn ghost s-finish">完成</button>
    </div>`;
  el._state={paper:[],idx:0,right:0,user:{},revealed:{},firstScored:{}};
  el.querySelector('.s-prev').onclick=()=>{el._state.idx--;render(el)};
  el.querySelector('.s-next').onclick=()=>{el._state.idx++;render(el)};
}

function render(root){
  const st=root._state,pi=st.paper[st.idx],q=BANK[pi];
  root.querySelector('.s-q').textContent=q.question;
  root.querySelector('.s-progress').textContent=`${st.idx+1}/${st.paper.length}`;
}
</script>
</body>
</html>
