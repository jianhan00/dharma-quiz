<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<!-- ✅ Safari / iOS 強快取修正：只新增，不改動其他內容 -->
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />

<title>線上刷題小程序（桌機版含搜尋）</title>
<style>
:root{--bg:#f6f7fb;--card:#fff;--ink:#0f172a;--muted:#64748b;--brand:#3b82f6;--ok:#16a34a;--bad:#ef4444;--line:#e5e7eb}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,"Noto Sans TC",sans-serif;background:var(--bg);color:var(--ink)}
.wrap{max-width:1100px;margin:24px auto;padding:0 16px}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:0 10px 30px rgba(15,23,42,.06);padding:18px}
h1{margin:0 0 8px;font-size:40px}
.sub{color:var(--muted);font-size:14px}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}

button,select{border:1px solid var(--line);border-radius:10px;padding:12px 14px;background:#fff;color:var(--ink);font-size:18px;cursor:pointer}
.btn.brand{background:var(--brand);border-color:var(--brand);color:#fff}
.btn.ghost{background:#fff}

.badge{background:#f1f5f9;border:1px solid var(--line);border-radius:12px;padding:10px 14px;font-size:18px;margin-right:8px}
.hr{height:1px;background:var(--line);margin:14px 0}

.question{font-size:32px;line-height:1.7;margin:8px 0 10px}
.opt{display:flex;align-items:flex-start;gap:12px;border:1px solid var(--line);border-radius:12px;padding:12px 12px;margin:8px 0;font-size:26px;background:#fff;cursor:pointer}
.opt input{transform:scale(1.2);margin-top:4px}
.opt:hover{background:#f8fafc}
.opt.correct{border-color:var(--ok);background:#f0fdf4}
.opt.wrong{border-color:var(--bad);background:#fef2f2}

.feedback{margin-top:10px;border:1px solid var(--line);border-radius:10px;padding:12px;font-size:20px;background:#f8fafc}
.feedback.ok{color:var(--ok)}.feedback.bad{color:var(--bad)}
.nav{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}

.chips{display:flex;gap:10px;flex-wrap:wrap}
.chip{display:inline-flex;align-items:center;gap:10px;padding:10px 14px;border:1px solid var(--line);background:#eef2ff;border-radius:999px;font-size:18px;cursor:pointer}
.chip input{width:20px;height:20px;cursor:pointer}

.report{margin-top:14px;border:1px solid var(--line);background:#fff;border-radius:12px;padding:14px}
.hidden{display:none}

/* 搜尋區 */
.searchBox{border:1px solid var(--line);background:#fff;border-radius:14px;padding:14px}
.searchInput{
  flex:1; min-width:320px;
  font-size:20px; padding:12px 14px;
  border:1px solid var(--line); border-radius:10px;
}
.searchInfo{font-size:14px;color:var(--muted)}
.searchResults{margin-top:14px}
.resultItem{
  border:1px solid var(--line);
  border-radius:14px;
  padding:14px;
  margin:10px 0;
  background:#fff;
}
.resultQ{font-size:22px;font-weight:700;line-height:1.6}
.resultMeta{margin-top:6px;color:var(--muted);font-size:14px}
.resultSmall{margin-top:8px;font-size:18px;line-height:1.7}
mark{padding:0 2px;border-radius:4px}
</style>
</head>

<body>
<div class="wrap">
  <div class="card">
    <h1>線上刷題小程序 <span class="sub">— 桌機版（含關鍵字搜尋）</span></h1>
  </div>

  <!-- ✅ 搜尋區（桌機版新增，不影響原刷題流程） -->
  <div class="card searchBox" id="search-card" style="margin-top:14px; display:none;">
    <div class="row" style="align-items:stretch;">
      <div style="font-size:18px;font-weight:700; padding-top:10px;">搜尋：</div>

      <select id="searchScope" style="min-width:220px;"></select>

      <input id="searchInput" class="searchInput" type="text" placeholder="輸入關鍵字（題目／選項／解析）" />

      <button id="searchBtn" class="btn brand">搜尋</button>
      <button id="searchClearBtn" class="btn ghost">清除</button>
      <!-- ✅ 你要的按鈕：用搜尋命中的題目組卷（可跨章） -->
      <button id="searchPracticeBtn" class="btn brand" style="display:none;">用搜尋結果開始練習</button>
    </div>

    <div class="row" style="margin-top:10px;">
      <span class="searchInfo" id="searchInfo">提示：支援跨章節搜尋；也可用下拉選單只搜單一章。</span>
    </div>

    <div class="searchResults" id="searchResults"></div>
  </div>

  <!-- 原本刷題區（維持） -->
  <div class="card" id="panel-student" style="margin-top:14px;">載入題庫中...</div>
</div>

<script>
const $ = s => document.querySelector(s);
const isArray = Array.isArray;
function normalize(a){ if(a==null) return []; return isArray(a)? [...a].sort((x,y)=>x-y) : [a]; }
function same(a,b){ a=normalize(a); b=normalize(b); return a.length===b.length && a.every((v,i)=>v===b[i]); }
function shuffle(arr){ return arr.map(v=>[Math.random(),v]).sort((a,b)=>a[0]-b[0]).map(x=>x[1]); }

let BANK = [];
let SECTIONS = [];
let LAST_HITS = []; // ✅ 記住搜尋命中的題號，供「用搜尋結果開始練習」

async function init(){
  try {
    // ✅ Safari / iOS 強快取修正：只在 fetch 加上 cache: 'no-store'，其餘不動
    const r = await fetch('questions.json?t=' + new Date().getTime(), { cache: 'no-store' });
    if(!r.ok) throw new Error('讀取失敗');
    BANK = await r.json();

    // 章節清單
    SECTIONS = [...new Set(BANK.map(q => q.section || '未分類'))];

    // ✅ 先掛上刷題
    mountStudent('#panel-student');

    // ✅ 再啟用搜尋（不影響刷題）
    initSearchUI();

  } catch(e) {
    $('#panel-student').innerHTML = `<p style="color:red">無法讀取題庫，請確認 questions.json 是否已上傳。</p>`;
  }
}

/* =========================
   搜尋功能（跨章 / 單章）
========================= */
function initSearchUI(){
  // 顯示搜尋卡片
  $('#search-card').style.display = '';

  // 填入下拉：全部章節 + 各章
  const sel = $('#searchScope');
  sel.innerHTML = `
    <option value="__all__" selected>全部章節（跨章）</option>
    ${SECTIONS.map(s => `<option value="${escapeHtmlAttr(s)}">只搜：${escapeHtml(s)}</option>`).join('')}
  `;

  // 綁定事件
  $('#searchBtn').onclick = () => doSearch();
  $('#searchClearBtn').onclick = () => clearSearch();
  $('#searchPracticeBtn').onclick = () => startPracticeFromHitList();

  $('#searchInput').addEventListener('keydown', (e) => {
    if(e.key === 'Enter'){ doSearch(); }
  });
}

function clearSearch(){
  $('#searchInput').value = '';
  $('#searchResults').innerHTML = '';
  $('#searchInfo').textContent = '提示：支援跨章節搜尋；也可用下拉選單只搜單一章。';
  LAST_HITS = [];
  $('#searchPracticeBtn').style.display = 'none';
}

function doSearch(){
  const kwRaw = ($('#searchInput').value || '').trim();
  const scope = $('#searchScope').value;

  if(!kwRaw){
    $('#searchInfo').textContent = '請先輸入關鍵字。';
    $('#searchResults').innerHTML = '';
    LAST_HITS = [];
    $('#searchPracticeBtn').style.display = 'none';
    return;
  }

  const kw = kwRaw.toLowerCase();

  // 篩選題目：題幹/選項/解析 任一包含
  const hits = [];
  for(let i=0;i<BANK.length;i++){
    const q = BANK[i];
    const section = (q.section || '未分類');
    if(scope !== '__all__' && section !== scope) continue;

    const hay = [
      q.question || '',
      ...(q.options || []),
      q.explanation || ''
    ].join(' \n ').toLowerCase();

    if(hay.includes(kw)){
      hits.push({idx:i, q});
    }
  }

  $('#searchInfo').textContent = `找到 ${hits.length} 題（範圍：${scope==='__all__'?'全部章節':scope}）`;

  // ✅ 記住命中的題號（供「用搜尋結果開始練習」）
  LAST_HITS = hits.map(x => x.idx);

  // ✅ 顯示/隱藏「用搜尋結果開始練習」按鈕
  const pb = $('#searchPracticeBtn');
  pb.style.display = (LAST_HITS.length > 0) ? '' : 'none';

  // 顯示結果（先顯示前 100 題，避免太長）
  const show = hits.slice(0, 100);
  $('#searchResults').innerHTML = show.length ? `
    ${show.map(item => renderHit(item.idx, item.q, kwRaw)).join('')}
    ${hits.length>100 ? `<div class="searchInfo">（結果超過 100 題，先顯示前 100 題）</div>` : ``}
  ` : `<div class="searchInfo">沒有找到符合的題目。你可以換個關鍵字或改成「全部章節」。</div>`;

  // 點「帶入刷題」按鈕時的事件委派
  $('#searchResults').querySelectorAll('[data-action="startFrom"]').forEach(btn=>{
    btn.addEventListener('click', (e)=>{
      const qi = parseInt(e.currentTarget.getAttribute('data-qi'), 10);
      startPracticeFromQuestionIndex(qi);
    });
  });
}

function renderHit(idx, q, kwRaw){
  const section = escapeHtml(q.section || '未分類');
  const question = highlight(escapeHtml(q.question || ''), kwRaw);
  const optText = (q.options||[]).map((t, i)=>`${String.fromCharCode(65+i)}. ${t}`).join('　');
  const options = highlight(escapeHtml(optText), kwRaw);
  const exp = q.explanation ? highlight(escapeHtml(q.explanation), kwRaw) : '（無解析）';

  return `
    <div class="resultItem">
      <div class="resultQ">${question}</div>
      <div class="resultMeta">章節：${section}　｜　題號索引：${idx+1}</div>
      <div class="resultSmall"><b>選項：</b>${options || '（無）'}</div>
      <div class="resultSmall"><b>解析：</b>${exp}</div>
      <div class="row" style="margin-top:12px;">
        <button class="btn brand" data-action="startFrom" data-qi="${idx}">用這題開始刷題（同章節）</button>
      </div>
    </div>
  `;
}

/* ✅ 新增：把「搜尋命中題目」直接組成練習卷（可跨章） */
function startPracticeFromHitList(){
  if(!LAST_HITS || LAST_HITS.length === 0){
    alert('目前沒有搜尋結果可練習，請先搜尋。');
    return;
  }

  const root = $('#panel-student');
  if(!root._state){
    mountStudent('#panel-student');
  }

  const st = root._state;

  // 直接用命中題號當練習卷（可跨章）
  st.paper = [...LAST_HITS];
  st.idx = 0;
  st.right = 0;
  st.user = {};
  st.revealed = {};
  st.firstScored = {};

  root.querySelector('.s-finish').disabled = false;
  root.querySelector('.s-nav').classList.remove('hidden');
  render(root);

  root.scrollIntoView({behavior:'smooth', block:'start'});
}

/* 保留：用單題定位進刷題區（同章節） */
function startPracticeFromQuestionIndex(qi){
  const sec = (BANK[qi].section || '未分類');

  const root = $('#panel-student');
  if(!root._state){
    mountStudent('#panel-student');
  }

  // 依照「同章節」建立 paper（順序）
  const poolIdx = BANK.map((q,i)=>({q,i}))
    .filter(x => (x.q.section||'未分類') === sec)
    .map(x=>x.i);

  // 定位到該題在同章 paper 的位置
  const pos = poolIdx.indexOf(qi);

  // 套用到刷題 state
  const st2 = $('#panel-student')._state;
  st2.paper = poolIdx;
  st2.idx = Math.max(0, pos);
  st2.right = 0; st2.user = {}; st2.revealed = {}; st2.firstScored = {};

  // 讓 UI 進入作答狀態
  $('#panel-student').querySelector('.s-finish').disabled = false;
  $('#panel-student').querySelector('.s-nav').classList.remove('hidden');

  render($('#panel-student'));

  // 捲動到刷題區
  $('#panel-student').scrollIntoView({behavior:'smooth', block:'start'});
}

/* =========================
   原本刷題功能（維持）
========================= */
function mountStudent(selector){
  const el = $(selector);
  el.innerHTML=`
    <div class="row">
      <div class="badge">共 <b class="s-total">${BANK.length}</b> 題</div>
      <div class="badge">目前：<b class="s-progress">0/0</b></div>
      <div class="badge">已答對：<b class="s-right">0</b></div>
    </div>
    <div class="row" style="margin-top:10px">
      <div style="font-size:18px;font-weight:bold">章節：</div>
      <div class="chips s-sections"></div>
    </div>
    <div class="hr"></div>
    <div class="row">
      <label style="font-size:18px">模式</label>
      <select class="s-mode"><option value="order">依順序</option><option value="shuffle">隨機</option></select>
      <label style="font-size:18px">題數</label>
      <select class="s-count"><option value="10" selected>10</option><option value="20">20</option><option value="50">50</option><option value="all">全部</option></select>
      <button class="btn brand s-start">開始作答</button>
      <button class="btn ghost s-reset">重置</button>
      <button class="btn ghost s-finish" disabled>完成並看成績</button>
    </div>
    <div class="hr"></div>
    <div class="question s-q">請選擇章節與題數後，按「開始作答」</div>
    <div class="s-optBox"></div>
    <div class="feedback s-fb hidden">
      <div class="s-fbTitle" style="font-weight:bold"></div>
      <div class="s-fbAns"></div>
      <div class="s-fbExp"></div>
    </div>
    <div class="nav hidden s-nav">
      <button class="btn s-prev">← 上一題</button>
      <button class="btn s-next">下一題 →</button>
    </div>
    <div class="report hidden s-report"></div>
  `;
  
  const state = {paper:[], idx:0, right:0, user:{}, revealed:{}, firstScored:{}};
  el._state = state;
  
  const secs = [...new Set(BANK.map(q => q.section||'未分類'))];
  el.querySelector('.s-sections').innerHTML = secs.map(s => `
    <label class="chip"><input type="checkbox" value="${escapeHtmlAttr(s)}" checked> ${escapeHtml(s)}</label>
  `).join('');

  el.querySelector('.s-start').onclick = () => start(el);
  el.querySelector('.s-reset').onclick = () => mountStudent(selector); 
  el.querySelector('.s-prev').onclick = () => { if(state.idx>0){ state.idx--; render(el); } };
  el.querySelector('.s-next').onclick = () => { 
    if(state.idx < state.paper.length-1){ state.idx++; render(el); }
    else { showReport(el); }
  };
  el.querySelector('.s-finish').onclick = () => showReport(el);
}

function start(root){
  const st = root._state;
  const mode = root.querySelector('.s-mode').value;
  const wantStr = root.querySelector('.s-count').value;
  const chosen = [...root.querySelectorAll('.s-sections input:checked')].map(i=>i.value);
  
  if(!chosen.length) return alert('請至少勾選一個章節');
  
  const poolIdx = BANK.map((q,i)=>({q,i})).filter(x => chosen.includes(x.q.section||'未分類')).map(x=>x.i);
  if(!poolIdx.length) return alert('所選章節目前沒有題目');
  
  let list = (mode==='shuffle') ? shuffle(poolIdx) : poolIdx;
  const want = (wantStr==='all') ? list.length : Math.min(parseInt(wantStr), list.length);
  
  st.paper = list.slice(0, want);
  st.idx = 0; st.right = 0; st.user = {}; st.revealed = {}; st.firstScored = {};
  
  root.querySelector('.s-finish').disabled = false;
  root.querySelector('.s-nav').classList.remove('hidden');
  render(root);
}

function render(root){
  const st = root._state;
  const pi = st.paper[st.idx];
  const q = BANK[pi];
  
  root.querySelector('.s-progress').textContent = `${st.idx+1}/${st.paper.length}`;
  root.querySelector('.s-right').textContent = st.right;
  root.querySelector('.s-q').textContent = q.question;
  
  const box = root.querySelector('.s-optBox');
  box.innerHTML = '';
  const correct = normalize(q.answer);
  const isMulti = correct.length > 1;
  const cur = normalize(st.user[pi]);
  
  (q.options||[]).forEach((opt, i) => {
    const row = document.createElement('label'); 
    row.className = 'opt';
    const ip = document.createElement('input'); 
    ip.type = isMulti ? 'checkbox' : 'radio';
    ip.name = 'q_opt';
    ip.checked = cur.includes(i);
    
    row.onclick = (e) => {
      if(e.target !== ip) ip.checked = !ip.checked;
      
      let now = new Set(normalize(st.user[pi]));
      if(isMulti){
        if(ip.checked) now.add(i); else now.delete(i);
      } else {
        now = new Set([i]);
        box.querySelectorAll('input').forEach((inp, idx) => { if(idx!==i) inp.checked=false; });
      }
      st.user[pi] = [...now].sort((a,b)=>a-b);
      
      const uAns = st.user[pi];
      const right = same(uAns, q.answer);
      if(!isMulti || uAns.length >= correct.length){
         st.revealed[pi] = true;
         if(right && !st.firstScored[pi]){ st.right++; st.firstScored[pi]=true; }
         refreshUI(root, q, pi);
      }
    };
    row.append(ip, document.createTextNode(" " + opt));
    box.append(row);
  });
  
  refreshUI(root, q, pi);
}

function refreshUI(root, q, pi){
  const st = root._state;
  const isRev = st.revealed[pi];
  const uAns = normalize(st.user[pi]);
  const correct = normalize(q.answer);
  const ok = same(uAns, q.answer);
  
  const fb = root.querySelector('.s-fb');
  if(isRev){
    fb.classList.remove('hidden');
    fb.className = `feedback s-fb ${ok?'ok':'bad'}`;
    
    root.querySelector('.s-fbTitle').textContent = ok ? '答對了 ✅' : '答錯了 ❌';
    
    const ansText = correct.map(i => (q.options && q.options[i]) ? q.options[i] : ['A','B','C','D'][i]).join(', ');
    root.querySelector('.s-fbAns').textContent = '正確答案：' + ansText;
    
    root.querySelector('.s-fbExp').textContent = q.explanation ? '解析：' + q.explanation : '';
    
    root.querySelectorAll('.opt').forEach((row, i) => {
      row.classList.remove('correct','wrong');
      if(correct.includes(i)) row.classList.add('correct');
      else if(uAns.includes(i)) row.classList.add('wrong');
    });
  } else {
    fb.classList.add('hidden');
  }
}

function showReport(root){
  const st = root._state;
  const box = root.querySelector('.s-report');
  box.classList.remove('hidden');
  const wrongList = st.paper.filter(pi => !same(st.user[pi], BANK[pi].answer));
  
  box.innerHTML = `
    <h2 style="color:#3b82f6; margin-top:0">本次練習已完成</h2>
    <div style="margin-bottom:15px; font-size:18px;">
       <span class="chip">答對：${st.right} / ${st.paper.length}</span>
       <span class="chip">正確率：${Math.round(st.right/st.paper.length*100)}%</span>
    </div>
    ${wrongList.length===0 ? '<p style="font-size:20px; color:#16a34a">全對！太棒了 🎉</p>' :
      `<details open><summary>錯題清單 (${wrongList.length})</summary>
       <ul>${wrongList.map(pi => {
         const q = BANK[pi];
         const ansText = normalize(q.answer).map(i => (q.options && q.options[i]) ? q.options[i] : ['A','B','C','D'][i]).join(', ');
         return `<li style="margin:10px 0">
            <b style="font-size:18px">${escapeHtml(q.question||'')}</b><br>
            <span style="color:#16a34a">正解：${escapeHtml(ansText)}</span><br>
            <span class="sub">解析：${escapeHtml(q.explanation||'無')}</span>
         </li>`;
       }).join('')}</ul></details>`
    }
    <div style="margin-top:20px">
       <button class="btn brand" onclick="mountStudent('#panel-student')">再練習一次</button>
    </div>
  `;
  root.querySelector('.s-nav').classList.add('hidden');
  root.querySelector('.s-optBox').innerHTML = '';
  root.querySelector('.s-q').textContent = '';
}

/* =========================
   小工具：避免 XSS / 高亮
========================= */
function escapeHtml(s){
  return String(s??'')
    .replaceAll('&','&amp;')
    .replaceAll('<','&lt;')
    .replaceAll('>','&gt;')
    .replaceAll('"','&quot;')
    .replaceAll("'","&#039;");
}
function escapeHtmlAttr(s){
  return escapeHtml(s);
}
function highlight(htmlEscapedText, kwRaw){
  if(!kwRaw) return htmlEscapedText;
  const kw = escapeRegExp(kwRaw);
  const re = new RegExp(kw, 'gi');
  return htmlEscapedText.replace(re, (m)=>`<mark>${m}</mark>`);
}
function escapeRegExp(s){
  return String(s).replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

init();
</script>
</body>
</html>
