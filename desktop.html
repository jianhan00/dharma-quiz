<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />

<title>關鍵字刷題小程序</title>
<style>
:root{--bg:#f6f7fb;--card:#fff;--ink:#0f172a;--muted:#64748b;--brand:#3b82f6;--ok:#16a34a;--bad:#ef4444;--line:#e5e7eb}
*{box-sizing:border-box}

/* 全域基礎字體 */
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,"Noto Sans TC",sans-serif;background:var(--bg);color:var(--ink); font-size: 19px;} 

.wrap{max-width:1000px;margin:24px auto;padding:0 16px}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:0 10px 30px rgba(15,23,42,.06);padding:24px}

/* 標題 */
h1{margin:0 0 12px;font-size:32px}.sub{color:var(--muted);font-size:16px}

.row{display:flex;gap:12px;flex-wrap:wrap;align-items:center}

/* 通用元件加大 */
button,select,input[type="text"]{border:1px solid var(--line);border-radius:12px;padding:14px 16px;background:#fff;color:var(--ink);font-size:19px;cursor:pointer}
input[type="text"]{cursor:text; width: 260px;}

.btn.brand{background:var(--brand);border-color:var(--brand);color:#fff}.btn.ghost{background:#fff}

.badge{background:#f1f5f9;border:1px solid var(--line);border-radius:12px;padding:10px 16px;font-size:18px;margin-right:8px}
.hr{height:1px;background:var(--line);margin:24px 0}

/* --- 重點修改：題目與選項 --- */

/* 題目：已移除 font-weight: bold，改為 normal (一般粗細) */
.question{font-size:28px; font-weight: normal; line-height:1.6; margin:20px 0 24px; color:#000;}

/* 選項 */
.opt{display:flex;align-items:flex-start;gap:14px;border:1px solid var(--line);border-radius:14px;padding:16px 18px;margin:12px 0;font-size:24px;background:#fff;cursor:pointer; transition: background 0.2s;}
.opt:hover{background:#f8fafc}
.opt.correct{border-color:var(--ok);background:#f0fdf4}.opt.wrong{border-color:var(--bad);background:#fef2f2}

/* 選項前的勾選框 */
.opt input { width: 26px; height: 26px; margin-top: 6px; cursor: pointer; flex-shrink: 0; }

.feedback{margin-top:20px;border:1px solid var(--line);border-radius:14px;padding:20px;font-size:20px;background:#f8fafc; line-height: 1.6;}
.feedback.ok{color:var(--ok)}.feedback.bad{color:var(--bad)}

.nav{display:flex;gap:16px;flex-wrap:wrap;margin-top:24px}
.chips{display:flex;gap:12px;flex-wrap:wrap}
.chip{display:inline-flex;align-items:center;gap:10px;padding:12px 18px;border:1px solid var(--line);background:#eef2ff;border-radius:999px;font-size:18px;cursor:pointer}
.chip input{width:22px;height:22px;cursor:pointer}

.report{margin-top:24px;border:1px solid var(--line);background:#fff;border-radius:16px;padding:24px}
.hidden{display:none}

/* --- 手機版專屬調整 (螢幕寬度小於 600px) --- */
@media(max-width:600px){
  h1{font-size:28px}
  
  /* 手機版題目：維持 28px */
  .question{font-size:28px; margin: 16px 0 20px;} 
  
  /* 手機版選項 */
  .opt{font-size:24px; padding: 14px 16px;}
  
  input[type="text"]{width:100%; font-size: 20px;}
  select { font-size: 20px; }
  
  .s-mode, .s-count { width: 48%; } 
  .s-start, .s-reset, .s-finish { width: 100%; margin-top: 8px; padding: 16px; font-size: 22px; font-weight: normal; } /* 按鈕也不加粗了 */
  
  .nav button { flex: 1; padding: 16px; font-size: 20px; } 

  .wrap { padding: 0 12px; margin: 12px auto; }
  .card { padding: 18px; }
}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <h1>關鍵字刷題小程序 <span class="sub">— 雲端版</span></h1>
  </div>
  <div class="card" id="panel-student">載入題庫中...</div>
</div>

<script>
const $ = s => document.querySelector(s);
const isArray = Array.isArray;
function normalize(a){ if(a==null) return []; return isArray(a)? [...a].sort((x,y)=>x-y) : [a]; }
function same(a,b){ a=normalize(a); b=normalize(b); return a.length===b.length && a.every((v,i)=>v===b[i]); }
function shuffle(arr){ return arr.map(v=>[Math.random(),v]).sort((a,b)=>a[0]-b[0]).map(x=>x[1]); }

let BANK = [];

async function init(){
  try {
    const r = await fetch('questions.json?t=' + new Date().getTime(), { cache: 'no-store' });
    if(!r.ok) throw new Error('讀取失敗');
    BANK = await r.json();
    mountStudent('#panel-student');
  } catch(e) {
    $('#panel-student').innerHTML = `<p style="color:red; font-size:20px; font-weight:bold;">無法讀取題庫，請確認 questions.json 是否已上傳。</p>`;
  }
}

function mountStudent(selector){
  const el = $(selector);
  
  el.innerHTML=`
    <div class="row">
      <div class="badge">共 <b class="s-total">${BANK.length}</b> 題</div>
      <div class="badge">目前：<b class="s-progress">0/0</b></div>
      <div class="badge">已答對：<b class="s-right">0</b></div>
    </div>
    
    <div class="hr"></div>

    <div class="row">
      <div style="font-size:20px;font-weight:bold">1. 選擇章節：</div>
      <div class="chips s-sections"></div>
    </div>

    <div class="row" style="margin-top:20px">
      <div style="font-size:20px;font-weight:bold">2. 關鍵字搜尋：</div>
      <input type="text" class="s-keyword" placeholder="輸入關鍵字 (題目或解析)...">
    </div>

    <div class="hr"></div>

    <div class="row">
      <label style="font-size:18px">模式</label>
      <select class="s-mode"><option value="order">依順序</option><option value="shuffle">隨機</option></select>
      
      <label style="font-size:18px">題數</label>
      <select class="s-count">
        <option value="all" selected>全部</option>
        <option value="10">10</option>
        <option value="20">20</option>
        <option value="50">50</option>
      </select>
      
      <button class="btn brand s-start">開始作答</button>
      <button class="btn ghost s-reset">重置</button>
      <button class="btn ghost s-finish" disabled>完成並看成績</button>
    </div>

    <div class="hr"></div>
    <div class="question s-q">請選擇條件後，按「開始作答」</div>
    <div class="s-optBox"></div>
    
    <div class="feedback s-fb hidden">
      <div class="s-fbTitle" style="font-weight:bold"></div>
      <div class="s-fbAns"></div>
      <div class="s-fbExp"></div>
    </div>
    
    <div class="nav hidden s-nav">
      <button class="btn s-prev">← 上一題</button>
      <button class="btn s-next">下一題 →</button>
    </div>
    <div class="report hidden s-report"></div>
  `;
  
  const state = {paper:[], idx:0, right:0, user:{}, revealed:{}, firstScored:{}};
  el._state = state;
  
  const secs = [...new Set(BANK.map(q => q.section||'未分類'))];
  el.querySelector('.s-sections').innerHTML = secs.map(s => `
    <label class="chip"><input type="checkbox" value="${s}" checked> ${s}</label>
  `).join('');

  el.querySelector('.s-start').onclick = () => start(el);
  el.querySelector('.s-reset').onclick = () => mountStudent(selector); 
  el.querySelector('.s-prev').onclick = () => { if(state.idx>0){ state.idx--; render(el); } };
  el.querySelector('.s-next').onclick = () => { 
    if(state.idx < state.paper.length-1){ state.idx++; render(el); }
    else { showReport(el); }
  };
  el.querySelector('.s-finish').onclick = () => showReport(el);
}

function start(root){
  const st = root._state;
  const mode = root.querySelector('.s-mode').value;
  const wantStr = root.querySelector('.s-count').value;
  const keyword = root.querySelector('.s-keyword').value.trim().toLowerCase(); 
  const chosen = [...root.querySelectorAll('.s-sections input:checked')].map(i=>i.value);
  
  if(!chosen.length) return alert('請至少勾選一個章節');
  
  let pool = BANK.map((q,i)=>({q,i})).filter(x => chosen.includes(x.q.section||'未分類'));

  if(keyword) {
    pool = pool.filter(item => {
      const qText = (item.q.question || "").toLowerCase();
      const expText = (item.q.explanation || "").toLowerCase();
      return qText.includes(keyword) || expText.includes(keyword);
    });
  }

  const poolIdx = pool.map(x=>x.i);

  if(!poolIdx.length) {
    if(keyword) return alert(`在選定的章節中，找不到包含「${keyword}」的題目。`);
    return alert('所選章節目前沒有題目');
  }
  
  let list = (mode==='shuffle') ? shuffle(poolIdx) : poolIdx;
  const want = (wantStr==='all') ? list.length : Math.min(parseInt(wantStr), list.length);
  
  st.paper = list.slice(0, want);
  st.idx = 0; st.right = 0; st.user = {}; st.revealed = {}; st.firstScored = {};
  
  root.querySelector('.s-finish').disabled = false;
  root.querySelector('.s-nav').classList.remove('hidden');
  render(root);
}

function render(root){
  const st = root._state;
  const pi = st.paper[st.idx];
  const q = BANK[pi];
  
  root.querySelector('.s-progress').textContent = `${st.idx+1}/${st.paper.length}`;
  root.querySelector('.s-right').textContent = st.right;
  root.querySelector('.s-q').textContent = q.question;
  
  const box = root.querySelector('.s-optBox');
  box.innerHTML = '';
  const correct = normalize(q.answer);
  const isMulti = correct.length > 1;
  const cur = normalize(st.user[pi]);
  
  (q.options||[]).forEach((opt, i) => {
    const row = document.createElement('label'); 
    row.className = 'opt';
    const ip = document.createElement('input'); 
    ip.type = isMulti ? 'checkbox' : 'radio';
    ip.name = 'q_opt';
    ip.checked = cur.includes(i);
    
    row.onclick = (e) => {
      if(e.target !== ip) ip.checked = !ip.checked;
      
      let now = new Set(normalize(st.user[pi]));
      if(isMulti){
        if(ip.checked) now.add(i); else now.delete(i);
      } else {
        now = new Set([i]);
        box.querySelectorAll('input').forEach((inp, idx) => { if(idx!==i) inp.checked=false; });
      }
      st.user[pi] = [...now].sort((a,b)=>a-b);
      
      const uAns = st.user[pi];
      const right = same(uAns, q.answer);
      if(!isMulti || uAns.length >= correct.length){
         st.revealed[pi] = true;
         if(right && !st.firstScored[pi]){ st.right++; st.firstScored[pi]=true; }
         refreshUI(root, q, pi);
      }
    };
    row.append(ip, document.createTextNode(" " + opt));
    box.append(row);
  });
  
  refreshUI(root, q, pi);
}

function refreshUI(root, q, pi){
  const st = root._state;
  const isRev = st.revealed[pi];
  const uAns = normalize(st.user[pi]);
  const correct = normalize(q.answer);
  const ok = same(uAns, q.answer);
  
  const fb = root.querySelector('.s-fb');
  if(isRev){
    fb.classList.remove('hidden');
    fb.className = `feedback s-fb ${ok?'ok':'bad'}`;
    
    root.querySelector('.s-fbTitle').textContent = ok ? '答對了 ✅' : '答錯了 ❌';
    
    const ansText = correct.map(i => (q.options && q.options[i]) ? q.options[i] : ['A','B','C','D'][i]).join(', ');
    root.querySelector('.s-fbAns').textContent = '正確答案：' + ansText;
    
    root.querySelector('.s-fbExp').textContent = q.explanation ? '解析：' + q.explanation : '';
    
    root.querySelectorAll('.opt').forEach((row, i) => {
      row.classList.remove('correct','wrong');
      if(correct.includes(i)) row.classList.add('correct');
      else if(uAns.includes(i)) row.classList.add('wrong');
    });
  } else {
    fb.classList.add('hidden');
  }
}

function showReport(root){
  const st = root._state;
  const box = root.querySelector('.s-report');
  box.classList.remove('hidden');
  const wrongList = st.paper.filter(pi => !same(st.user[pi], BANK[pi].answer));
  
  box.innerHTML = `
    <h2 style="color:#3b82f6; margin-top:0">本次練習已完成</h2>
    <div style="margin-bottom:15px; font-size:20px;">
       <span class="chip">答對：${st.right} / ${st.paper.length}</span>
       <span class="chip">正確率：${st.paper.length > 0 ? Math.round(st.right/st.paper.length*100) : 0}%</span>
    </div>
    ${wrongList.length===0 ? '<p style="font-size:22px; color:#16a34a">全對！太棒了 🎉</p>' : 
      `<details open><summary>錯題清單 (${wrongList.length})</summary>
       <ul>${wrongList.map(pi => {
         const q = BANK[pi];
         const ansText = normalize(q.answer).map(i => (q.options && q.options[i]) ? q.options[i] : ['A','B','C','D'][i]).join(', ');
         return `<li>
            <b>${q.question}</b><br>
            <span style="color:#16a34a">正解：${ansText}</span><br>
            <span class="sub">解析：${q.explanation||'無'}</span>
         </li>`;
       }).join('')}</ul></details>`
    }
    <div style="margin-top:24px">
       <button class="btn brand" onclick="mountStudent('#panel-student')" style="width:100%; font-size:22px; padding:16px;">再練習一次</button>
    </div>
  `;
  root.querySelector('.s-nav').classList.add('hidden');
  root.querySelector('.s-optBox').innerHTML = '';
  root.querySelector('.s-q').textContent = ''; 
}
init();
</script>
</body>
</html>
