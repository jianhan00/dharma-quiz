<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1A1A2E">
<link rel="manifest" href="manifest.json">
<title>大乘起信論 · 期末刷題</title>
<style>
:root{
  --paper:#FAF7F0;      /* 米色紙感底 */
  --card:#FFFDF8;       /* 卡片（偏暖白）*/
  --ink:#1A1A2E;        /* 藏青（主要文字）*/
  --ink-soft:#4A4A5E;   /* 次要文字 */
  --muted:#8A836F;      /* 說明灰（帶暖）*/
  --gold:#C0912F;       /* 古金 */
  --gold-lite:#D4A547;  /* 亮金 */
  --wine:#8B2635;       /* 朱赭 */
  --sage:#3F6B4E;       /* 沉靜墨綠（答對）*/
  --line:#E6DCC5;       /* 暖色細線 */
  --serif:"Songti TC","STSong","Noto Serif TC","SimSun",serif;
  --sans:-apple-system,BlinkMacSystemFont,"PingFang TC","Microsoft JhengHei","Noto Sans TC","Segoe UI",sans-serif;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:var(--sans);
  color:var(--ink);
  background:
    radial-gradient(1200px 500px at 50% -10%, rgba(192,145,47,.06), transparent 60%),
    var(--paper);
  font-size:18px;line-height:1.5;
}
.wrap{max-width:680px;margin:0 auto;padding:20px 16px 40px;min-height:100%}
.hidden{display:none !important}

/* 螢幕切換動效 */
.screen{animation:fade .35s ease}
@keyframes fade{from{opacity:0}to{opacity:1}}
@keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
@media(prefers-reduced-motion:reduce){.screen,.q-card.anim{animation:none}}

/* 通用按鈕 */
.btn{font-family:var(--sans);font-size:19px;border:1px solid var(--line);background:var(--card);color:var(--ink);
  border-radius:12px;padding:12px 18px;cursor:pointer;transition:.15s;line-height:1.2}
.btn:active{transform:translateY(1px)}
.btn-primary{background:var(--ink);color:#F7F2E6;border-color:var(--ink)}
.btn-primary:hover{background:#26263f}
.btn-gold{background:var(--card);color:var(--ink);border:1.5px solid var(--gold)}
.btn-gold:hover{background:#FBF4E2}
.btn-ghost{background:transparent;color:var(--ink-soft);border-color:var(--line)}

/* 金色細規線 */
.rule{height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:14px 0}

/* ============ 封面 ============ */
.cover{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;
  min-height:calc(100vh - 60px);padding:20px 0}
.seal{width:78px;height:78px;border:2.5px solid var(--wine);border-radius:10px;color:var(--wine);
  font-family:var(--serif);font-weight:700;display:flex;align-items:center;justify-content:center;
  font-size:30px;letter-spacing:2px;line-height:1;transform:rotate(-3deg);
  box-shadow:0 2px 0 rgba(139,38,53,.12);writing-mode:vertical-rl;padding:8px 4px}
.cover-eyebrow{margin-top:26px;color:var(--gold);font-family:var(--serif);letter-spacing:.5em;
  font-size:15px;padding-left:.5em}
.cover-title{font-family:var(--serif);font-weight:700;color:var(--ink);font-size:52px;
  letter-spacing:.08em;margin:10px 0 4px;line-height:1.15}
.cover-line{width:70px;height:2px;background:var(--gold);margin:16px auto}
.cover-sub{color:var(--ink-soft);font-size:18px;letter-spacing:.05em}
.cover-enter{margin-top:34px;min-width:180px;font-size:20px;letter-spacing:.3em;padding-left:.3em}
.cover-foot{margin-top:22px;color:var(--muted);font-size:14px;letter-spacing:.1em}

/* ============ 章節頁 ============ */
.head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:6px}
.head-title{font-family:var(--serif);font-weight:700;font-size:24px;letter-spacing:.06em;color:var(--ink)}
.icon-btn{width:40px;height:40px;border-radius:50%;border:1px solid var(--line);background:var(--card);
  color:var(--muted);font-size:20px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.icon-btn:active{transform:rotate(180deg)}
.section-num{font-family:var(--serif);color:var(--gold);font-weight:700;font-size:19px;margin:18px 0 8px;letter-spacing:.08em}
.section-num small{color:var(--muted);font-weight:400;font-family:var(--sans);font-size:14px;letter-spacing:0;margin-left:6px}
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{display:inline-flex;align-items:center;gap:8px;padding:9px 14px;border:1px solid var(--line);
  background:var(--card);border-radius:999px;font-size:19px;cursor:pointer;transition:.15s;color:var(--ink-soft)}
.chip.on{background:#F3ECDA;border-color:var(--gold);color:var(--ink);font-weight:500}
.chip .tick{width:20px;height:20px;border-radius:50%;border:1.5px solid var(--line);display:flex;
  align-items:center;justify-content:center;font-size:13px;color:transparent;background:#fff;flex-shrink:0}
.chip.on .tick{background:var(--gold);border-color:var(--gold);color:#fff}
.kw{width:100%;font-family:var(--sans);font-size:19px;border:1px solid var(--line);border-radius:12px;
  padding:12px 14px;background:var(--card);color:var(--ink)}
.kw::placeholder{color:var(--muted)}
.controls{display:flex;gap:12px;margin-top:14px;flex-wrap:wrap}
.ctrl{flex:1;min-width:130px}
.ctrl label{display:block;font-size:15px;color:var(--muted);margin-bottom:5px;letter-spacing:.1em}
.sel{width:100%;font-family:var(--sans);font-size:19px;border:1px solid var(--line);border-radius:12px;
  padding:11px 34px 11px 14px;background:var(--card);color:var(--ink);cursor:pointer;
  appearance:none;-webkit-appearance:none;
  background-image:url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292%22%20height%3D%22292%22%3E%3Cpath%20fill%3D%22%23C0912F%22%20d%3D%22M287%2069a18%2018%200%200%200-13-5H18a18%2018%200%200%200-13%2031l128%20128a18%2018%200%200%200%2026%200L287%2095a18%2018%200%200%200%200-26z%22%2F%3E%3C%2Fsvg%3E");
  background-repeat:no-repeat;background-position:right 12px center;background-size:12px}
.actions{display:flex;gap:12px;margin-top:22px}
.actions .btn{flex:1;font-size:20px;letter-spacing:.15em;padding:14px 8px}
.exam-hint{margin-top:14px;color:var(--muted);font-size:14px;line-height:1.6;
  border-left:2px solid var(--gold);padding:2px 0 2px 12px}

/* ============ 作答 ============ */
.quiz-top{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px}
.mode-tag{font-family:var(--serif);font-size:16px;letter-spacing:.15em;color:var(--wine);font-weight:700}
.mode-tag.practice{color:var(--gold)}
.progress-txt{font-size:15px;color:var(--muted);letter-spacing:.05em}
.bar{height:4px;background:var(--line);border-radius:999px;overflow:hidden;margin-bottom:20px}
.bar>i{display:block;height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-lite));width:0;transition:width .3s}
.q-card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:22px 20px;
  box-shadow:0 6px 24px rgba(26,26,46,.05)}
.q-card.anim{animation:rise .3s ease}
.q-head{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.q-seal{width:44px;height:44px;flex-shrink:0;border:2px solid var(--wine);border-radius:9px;color:var(--wine);
  font-family:var(--serif);font-weight:700;font-size:20px;display:flex;align-items:center;justify-content:center;
  transform:rotate(-2deg);line-height:1}
.q-type{font-family:var(--serif);font-size:15px;letter-spacing:.1em;color:var(--ink-soft);
  border:1px solid var(--line);border-radius:999px;padding:3px 12px}
.q-text{font-size:24px;line-height:1.6;color:var(--ink);margin-bottom:16px}
.opt{display:flex;align-items:flex-start;gap:12px;border:1px solid var(--line);border-radius:14px;
  padding:13px 15px;margin:9px 0;font-size:22px;line-height:1.5;background:#fff;cursor:pointer;transition:.12s;color:var(--ink)}
.opt:hover{border-color:var(--gold)}
.opt.locked{cursor:default}
.opt.locked:hover{border-color:var(--line)}
.opt .mk{width:26px;height:26px;flex-shrink:0;margin-top:1px;border-radius:50%;border:1.5px solid var(--line);
  background:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;color:transparent}
.opt.sel .mk{border-color:var(--ink);background:var(--ink);color:#F7F2E6}
.opt.correct{border-color:var(--sage);background:#F0F5F0}
.opt.correct .mk{border-color:var(--sage);background:var(--sage);color:#fff}
.opt.wrong{border-color:var(--wine);background:#FBF1F1}
.opt.wrong .mk{border-color:var(--wine);background:var(--wine);color:#fff}
.feedback{margin-top:16px;border:1px solid var(--line);border-left:3px solid var(--gold);border-radius:12px;
  padding:14px 16px;font-size:22px;line-height:1.7;background:#FBF6EA}
.feedback.ok{border-left-color:var(--sage)}
.feedback.bad{border-left-color:var(--wine)}
.fb-title{font-weight:700;font-family:var(--serif);letter-spacing:.05em;font-size:22px}
.feedback.ok .fb-title{color:var(--sage)}
.feedback.bad .fb-title{color:var(--wine)}
.fb-ans,.fb-exp{font-size:22px;line-height:1.7;margin-top:6px;color:var(--ink-soft)}
.nav{display:flex;gap:10px;margin-top:18px;align-items:center}
.nav .btn{padding:12px 16px;font-size:18px}
.nav .s-prev,.nav .s-next{flex:1}
.nav .s-nav-reset{margin-left:auto;color:var(--muted)}

/* ============ 成績 ============ */
.result-card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:24px 20px;
  box-shadow:0 6px 24px rgba(26,26,46,.05)}
.result-title{font-family:var(--serif);font-weight:700;font-size:26px;letter-spacing:.06em;color:var(--ink);text-align:center}
.score-big{font-family:var(--serif);font-size:60px;font-weight:700;color:var(--gold);text-align:center;line-height:1;margin:18px 0 4px}
.score-big small{font-size:22px;color:var(--muted);font-weight:400;font-family:var(--sans)}
.score-meta{text-align:center;color:var(--ink-soft);font-size:18px;letter-spacing:.05em}
.wrong-head{font-family:var(--serif);font-weight:700;font-size:20px;color:var(--wine);margin:22px 0 6px;letter-spacing:.05em}
.wrong-item{border-top:1px solid var(--line);padding:14px 0}
.wrong-q{font-size:20px;line-height:1.6;color:var(--ink);font-weight:500}
.wrong-ans{color:var(--sage);font-size:19px;margin-top:6px}
.wrong-exp{color:var(--muted);font-size:22px;line-height:1.7;margin-top:4px}
.result-actions{display:flex;gap:12px;margin-top:24px}
.result-actions .btn{flex:1;font-size:19px;letter-spacing:.1em}
.allright{text-align:center;color:var(--sage);font-size:22px;font-family:var(--serif);margin-top:18px}

/* 桌機微調 */
@media(min-width:700px){
  .cover-title{font-size:64px}
  .q-text{font-size:26px}
}
</style>
</head>
<body>
<div class="wrap" id="app">載入題庫中…</div>

<script>
const $  = (s,r=document) => r.querySelector(s);
const $$ = (s,r=document) => [...r.querySelectorAll(s)];
const isArray = Array.isArray;

function normalize(a){ if(a==null) return []; return isArray(a)? [...a].sort((x,y)=>x-y) : [a]; }
function same(a,b){ a=normalize(a); b=normalize(b); return a.length===b.length && a.every((v,i)=>v===b[i]); }
function shuffle(arr){ return arr.map(v=>[Math.random(),v]).sort((a,b)=>a[0]-b[0]).map(x=>x[1]); }
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function sectionLabel(s){ return String(s).replace(/^\d+(-\d+)?\s+/, ''); }   // 去章節編號（僅顯示）

const isMobile = () => window.matchMedia('(max-width:680px)').matches;
function scrollTop(){ window.scrollTo({top:0, behavior:'instant' in window ? 'instant' : 'auto'}); }
function scrollToEl(sel, block){ if(!isMobile()) return; const e=$(sel); if(e) e.scrollIntoView({behavior:'smooth', block}); }

function forceReload(){
  if(confirm("重新整理並檢查題庫更新？\n（會清除目前作答進度）")) window.location.reload();
}

let BANK = [];
const ST = { paper:[], idx:0, right:0, user:{}, revealed:{}, firstScored:{}, examMode:false };
let APP;

async function init(){
  try{
    const r = await fetch('questions.json', { cache:'no-store' });
    if(!r.ok) throw new Error('讀取失敗');
    BANK = await r.json();
    buildApp();
  }catch(e){
    $('#app').innerHTML = `<div class="q-card" style="margin-top:40px;color:var(--wine)">
      無法讀取題庫。請確認 questions.json 已上傳，再重新整理頁面。</div>`;
  }
}

function buildApp(){
  APP = $('#app');
  const tfN = BANK.filter(q => (q.options||[]).length===2).length;
  const mcN = BANK.filter(q => (q.options||[]).length>2).length;

  APP.innerHTML = `
<!-- 封面 -->
<section class="screen cover" id="screen-cover">
  <div class="seal">起信</div>
  <div class="cover-eyebrow">大乘經論 · 期末研習</div>
  <h1 class="cover-title">大乘起信論</h1>
  <div class="cover-line"></div>
  <div class="cover-sub">114 學年下學期 · 期末考刷題</div>
  <button class="btn btn-primary cover-enter" id="btn-enter">進入</button>
  <div class="cover-foot">全題庫 ${BANK.length} 題 · 是非 ${tfN}、選擇 ${mcN}</div>
</section>

<!-- 章節頁 -->
<section class="screen hidden" id="screen-select">
  <div class="head">
    <div class="head-title">選擇範圍</div>
    <button class="icon-btn" title="檢查更新" onclick="forceReload()">↻</button>
  </div>
  <div class="rule"></div>

  <div class="section-num">一、選擇章節</div>
  <div class="chips s-sections"></div>

  <div class="section-num">二、關鍵字 <small>選填，可搜題目或選項</small></div>
  <input type="text" class="kw s-keyword" placeholder="輸入關鍵字…">

  <div class="controls">
    <div class="ctrl">
      <label>出題順序</label>
      <select class="sel s-mode"><option value="order">依原順序</option><option value="shuffle">隨機打亂</option></select>
    </div>
    <div class="ctrl">
      <label>題數</label>
      <select class="sel s-count">
        <option value="all" selected>全部</option>
        <option value="10">10 題</option>
        <option value="20">20 題</option>
        <option value="50">50 題</option>
      </select>
    </div>
  </div>

  <div class="actions">
    <button class="btn btn-primary s-start">開始練習</button>
    <button class="btn btn-gold s-finish">模擬測驗</button>
  </div>
  <div class="exam-hint">模擬測驗：全題庫隨機抽 25 是非題＋25 選擇題，作答時不顯示解答，交卷後計分（每題 2 分，滿分 100）並列出錯題。</div>
</section>

<!-- 作答 -->
<section class="screen hidden" id="screen-quiz">
  <div class="quiz-top">
    <span class="mode-tag s-modetag"></span>
    <span class="progress-txt">第 <b class="s-progress">0/0</b> 題</span>
  </div>
  <div class="bar"><i class="s-barfill"></i></div>

  <div class="q-card" id="q-card">
    <div class="q-head">
      <div class="q-seal s-seal">1</div>
      <div class="q-type s-qtype">是非題</div>
    </div>
    <div class="q-text s-q"></div>
    <div class="s-optBox"></div>
    <div class="feedback s-fb hidden">
      <div class="fb-title s-fbTitle"></div>
      <div class="fb-ans s-fbAns"></div>
      <div class="fb-exp s-fbExp"></div>
    </div>
  </div>

  <div class="nav s-nav">
    <button class="btn btn-ghost s-prev">← 上一題</button>
    <button class="btn btn-ghost s-next">下一題 →</button>
    <button class="btn btn-ghost s-nav-reset">重置</button>
  </div>
</section>

<!-- 成績 -->
<section class="screen hidden" id="screen-result">
  <div class="result-card s-report"></div>
</section>
`;

  // 章節鈕（自訂勾選外觀，value 存完整章節名，顯示去前綴）
  const secs = [...new Set(BANK.map(q => q.section || '未分類'))];
  $('.s-sections', APP).innerHTML = secs.map(s => `
    <span class="chip on" data-val="${esc(s)}"><span class="tick">✓</span>${esc(sectionLabel(s))}</span>
  `).join('');
  $$('.s-sections .chip', APP).forEach(c => c.onclick = () => c.classList.toggle('on'));

  // 綁定事件
  $('#btn-enter', APP).onclick   = () => showScreen('select');
  $('.s-start', APP).onclick     = () => start();
  $('.s-finish', APP).onclick    = () => startExam();
  $('.s-nav-reset', APP).onclick = () => gotoSelect();
  $('.s-prev', APP).onclick      = () => { if(ST.idx>0){ ST.idx--; render(); } };
  $('.s-next', APP).onclick      = () => { if(ST.idx < ST.paper.length-1){ ST.idx++; render(); } else { showReport(); } };

  showScreen('cover');
}

function showScreen(name){
  ['cover','select','quiz','result'].forEach(n => {
    $('#screen-'+n, APP).classList.toggle('hidden', n!==name);
  });
  scrollTop();
}

function resetRun(){
  ST.paper=[]; ST.idx=0; ST.right=0; ST.user={}; ST.revealed={}; ST.firstScored={}; ST.examMode=false;
}
function gotoSelect(){ resetRun(); showScreen('select'); }

// ===== 一般練習 =====
function start(){
  const mode    = $('.s-mode', APP).value;
  const wantStr = $('.s-count', APP).value;
  const keyword = $('.s-keyword', APP).value.trim().toLowerCase();
  const chosen  = $$('.s-sections .chip.on', APP).map(c => c.dataset.val);
  if(!chosen.length) return alert('請至少選擇一個章節');

  let pool = BANK.map((q,i)=>({q,i})).filter(x => chosen.includes(x.q.section || '未分類'));
  if(keyword){
    pool = pool.filter(x => {
      const t = (x.q.question||'').toLowerCase();
      const o = (x.q.options||[]).join(' ').toLowerCase();
      return t.includes(keyword) || o.includes(keyword);
    });
  }
  let idxs = pool.map(x=>x.i);
  if(!idxs.length) return alert(keyword ? `找不到包含「${keyword}」的題目。` : '所選章節沒有題目');

  if(mode==='shuffle') idxs = shuffle(idxs);
  const want = (wantStr==='all') ? idxs.length : Math.min(parseInt(wantStr), idxs.length);

  resetRun();
  ST.paper = idxs.slice(0, want);
  ST.examMode = false;
  showScreen('quiz');
  render();
}

// ===== 模擬測驗：全題庫隨機 25 是非 + 25 選擇 =====
function startExam(){
  const tf=[], mc=[];
  BANK.forEach((q,i) => { ((q.options||[]).length===2 ? tf : mc).push(i); });
  if(!tf.length && !mc.length) return alert('題庫是空的');

  const tfPick = shuffle(tf).slice(0, Math.min(25, tf.length));
  const mcPick = shuffle(mc).slice(0, Math.min(25, mc.length));
  if(tfPick.length<25 || mcPick.length<25){
    if(!confirm(`題庫不足 25＋25（目前是非 ${tfPick.length}、選擇 ${mcPick.length}）。\n仍以現有題數進行模擬測驗嗎？`)) return;
  }

  resetRun();
  ST.paper = [...tfPick, ...mcPick];   // 是非在前、選擇在後
  ST.examMode = true;
  showScreen('quiz');
  render();
}

function render(){
  const pi = ST.paper[ST.idx];
  const q  = BANK[pi];
  const total = ST.paper.length;
  const isTF = (q.options||[]).length===2;

  $('.s-modetag', APP).textContent = ST.examMode ? '模擬測驗' : '章節練習';
  $('.s-modetag', APP).className = 'mode-tag s-modetag' + (ST.examMode ? '' : ' practice');
  $('.s-progress', APP).textContent = `${ST.idx+1}/${total}`;
  $('.s-barfill', APP).style.width = ((ST.idx+1)/total*100) + '%';
  $('.s-seal', APP).textContent = ST.idx+1;
  $('.s-qtype', APP).textContent = isTF ? '是非題' : '選擇題';
  $('.s-q', APP).textContent = q.question;

  const card = $('#q-card', APP);
  card.classList.remove('anim'); void card.offsetWidth; card.classList.add('anim');

  const box = $('.s-optBox', APP);
  box.innerHTML = '';
  const correct = normalize(q.answer);
  const isMulti = correct.length > 1;
  const cur = normalize(ST.user[pi]);
  const locked = !!ST.revealed[pi];

  (q.options||[]).forEach((opt, i) => {
    const row = document.createElement('div');
    row.className = 'opt' + (locked ? ' locked' : '') + (cur.includes(i) ? ' sel' : '');
    row.innerHTML = `<span class="mk">${cur.includes(i)?'●':''}</span><span>${esc(opt)}</span>`;

    row.onclick = () => {
      if(ST.revealed[pi]) return;                 // 已作答 → 鎖定
      let now;
      if(isMulti){
        now = new Set(normalize(ST.user[pi]));
        now.has(i) ? now.delete(i) : now.add(i);
      } else {
        now = new Set([i]);
      }
      ST.user[pi] = [...now].sort((a,b)=>a-b);

      // 單選一選即定；多選選滿正解數量即定
      if(!isMulti || ST.user[pi].length >= correct.length){
        ST.revealed[pi] = true;
        if(!ST.examMode && same(ST.user[pi], q.answer) && !ST.firstScored[pi]){
          ST.right++; ST.firstScored[pi] = true;
        }
        refreshUI(q, pi);
        if(ST.examMode) scrollToEl('.s-nav','center'); else scrollToEl('.s-fb','center');
      } else {
        // 多選未選滿：僅更新勾選外觀
        markSelected(box, ST.user[pi]);
      }
    };
    box.append(row);
  });

  refreshUI(q, pi);
  scrollToEl('.s-q','start');   // 手機：換題捲到題目
}

function markSelected(box, arr){
  $$('.opt', box).forEach((row,i) => {
    const on = arr.includes(i);
    row.classList.toggle('sel', on);
    row.querySelector('.mk').textContent = on ? '●' : '';
  });
}

function refreshUI(q, pi){
  const fb = $('.s-fb', APP);

  if(ST.examMode){ fb.classList.add('hidden'); return; }   // 模擬測驗不顯示解答

  if(!ST.revealed[pi]){ fb.classList.add('hidden'); return; }

  const uAns = normalize(ST.user[pi]);
  const correct = normalize(q.answer);
  const ok = same(uAns, q.answer);

  fb.className = 'feedback s-fb ' + (ok?'ok':'bad');
  $('.s-fbTitle', APP).textContent = ok ? '答對了' : '答錯了';
  const ansText = correct.map(i => (q.options && q.options[i]) ? q.options[i] : ['A','B','C','D'][i]).join('、');
  $('.s-fbAns', APP).textContent = '正解：' + ansText;
  $('.s-fbExp', APP).textContent = q.explanation ? '解析：' + q.explanation : '';

  // 鎖定並標示對錯
  $$('.opt', APP).forEach((row,i) => {
    row.classList.add('locked');
    row.classList.remove('correct','wrong');
    if(correct.includes(i)) row.classList.add('correct');
    else if(uAns.includes(i)) row.classList.add('wrong');
  });
}

function showReport(){
  const total = ST.paper.length;
  const correctCount = ST.paper.filter(pi => same(ST.user[pi], BANK[pi].answer)).length;
  const wrong = ST.paper.filter(pi => !same(ST.user[pi], BANK[pi].answer));
  const box = $('.s-report', APP);

  let scoreBlock;
  if(ST.examMode){
    // 每題 2 分，滿分＝題數×2
    scoreBlock = `
      <div class="result-title">模擬測驗結果</div>
      <div class="score-big">${correctCount*2}<small> / ${total*2} 分</small></div>
      <div class="score-meta">答對 ${correctCount} / ${total} 題</div>`;
  } else {
    scoreBlock = `
      <div class="result-title">練習完成</div>
      <div class="score-big">${correctCount}<small> / ${total}</small></div>
      <div class="score-meta">正確率 ${total>0 ? Math.round(correctCount/total*100) : 0}%</div>`;
  }

  const wrongBlock = wrong.length===0
    ? `<div class="allright">全部答對，隨喜讚歎 🌿</div>`
    : `<div class="wrong-head">錯題複習（${wrong.length}）</div>` +
      wrong.map(pi => {
        const q = BANK[pi];
        const ansText = normalize(q.answer).map(i => (q.options && q.options[i]) ? q.options[i] : ['A','B','C','D'][i]).join('、');
        return `<div class="wrong-item">
          <div class="wrong-q">${esc(q.question)}</div>
          <div class="wrong-ans">正解：${esc(ansText)}</div>
          <div class="wrong-exp">解析：${esc(q.explanation||'無')}</div>
        </div>`;
      }).join('');

  box.innerHTML = scoreBlock + `<div class="rule"></div>` + wrongBlock + `
    <div class="result-actions">
      <button class="btn btn-primary" onclick="gotoSelect()">再選一次</button>
      <button class="btn btn-ghost" onclick="showScreen('cover')">回封面</button>
    </div>`;

  showScreen('result');
}

init();

// Service Worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
</script>
</body>
</html>
