<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#3b82f6">
<link rel="manifest" href="manifest.json">
<title>114(下)起信論期末考刷題小程序</title>
<style>
:root{--bg:#f6f7fb;--card:#fff;--ink:#0f172a;--muted:#64748b;--brand:#3b82f6;--ok:#16a34a;--bad:#ef4444;--line:#e5e7eb}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
/* 1. 基礎字體 18px */
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,"Noto Sans TC",sans-serif;background:var(--bg);color:var(--ink); font-size: 18px;}
/* 離螢幕頂端 24px */
.wrap{max-width:1000px;margin:24px auto;padding:0 12px}
/* 卡片內距：上15px / 下10px */
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:0 10px 30px rgba(15,23,42,.06);padding:15px 16px 10px 16px; position: relative;}
/* 標題與標題列的刷新按鈕 */
.title-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
h1{margin:0;font-size:28px; line-height: 1.2;}
.sub{color:var(--muted);font-size:14px; font-weight: normal;}
/* 標題旁的重新整理按鈕 */
.btn-reload {
background: #f1f5f9; border: 1px solid var(--line); color: var(--muted);
width: 36px; height: 36px; border-radius: 50%;
display: flex; align-items: center; justify-content: center;
font-size: 20px; cursor: pointer; transition: 0.2s;
}
.btn-reload:active { background: #e2e8f0; transform: rotate(180deg); }
/* 行間距 */
.row{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
/* 2. 元件樣式 */
button,select,input[type="text"]{border:1px solid var(--line);border-radius:10px;padding:8px 12px;background:#fff;color:var(--ink);font-size:18px;cursor:pointer; appearance: none; -webkit-appearance: none;}
input[type="text"]{cursor:text; width: 240px;}
/* 修正 iOS 下拉選單箭頭消失問題 */
select {
background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23007CB2%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
background-repeat: no-repeat;
background-position: right 10px center;
background-size: 12px;
padding-right: 30px;
}
.btn.brand{background:var(--brand);border-color:var(--brand);color:#fff}.btn.ghost{background:#fff}
/* 統計標籤 */
.badge{background:#f1f5f9;border:1px solid var(--line);border-radius:12px;padding:6px 10px;font-size:18px;}
/* 分隔線 */
.hr{height:1px;background:var(--line);margin:10px 0}
/* 3. 題目與選項 */
.question{font-size:25px; line-height:1.4; margin:10px 0 12px; font-weight: normal; color: var(--ink);}
.opt{display:flex;align-items:flex-start;gap:10px;border:1px solid var(--line);border-radius:12px;padding:10px 12px;margin:4px 0;font-size:22px;line-height:1.5;background:#fff;cursor:pointer}
.opt:hover{background:#f8fafc}
.opt.locked{cursor:default}
.opt.locked:hover{background:#fff}
.opt.correct{border-color:var(--ok);background:#f0fdf4}.opt.wrong{border-color:var(--bad);background:#fef2f2}
.opt.correct:hover{background:#f0fdf4}.opt.wrong:hover{background:#fef2f2}
.opt input { width: 21px; height: 21px; margin-top: 5px; cursor: pointer; flex-shrink: 0; }
.opt input:disabled { cursor: default; }
/* 作答回饋與解析（放大字級） */
.feedback{margin-top:10px;border:1px solid var(--line);border-radius:12px;padding:12px;font-size:20px;line-height:1.7;background:#f8fafc}
.feedback.ok{color:var(--ok)}.feedback.bad{color:var(--bad)}
.s-fbAns,.s-fbExp{font-size:20px;line-height:1.7;margin-top:4px}
/* 錯題清單解析（放大字級） */
.exp{font-size:18px;color:var(--muted);line-height:1.7}
.nav{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
.chips{display:flex;gap:8px;flex-wrap:wrap}
.chip{display:inline-flex;align-items:center;gap:6px;padding:6px 10px;border:1px solid var(--line);background:#eef2ff;border-radius:999px;font-size:18px;cursor:pointer}
.chip input{width:18px;height:18px;cursor:pointer}
.report{margin-top:12px;border:1px solid var(--line);background:#fff;border-radius:14px;padding:14px}
.hidden{display:none}
/* 排版輔助 */
.control-group { display: flex; gap: 8px; align-items: center; }
.ctrl-item { display: flex; align-items: center; gap: 6px; }
.btn-group { display: flex; gap: 8px; }
/* 4. 手機版專屬設定 */
@media(max-width:600px){
h1{font-size:26px}
.question{font-size:24px}
.opt{font-size:23px}
.feedback{font-size:21px}
.s-fbAns,.s-fbExp{font-size:21px}
.exp{font-size:19px}
input[type="text"]{width:100%; font-size: 18px;}
select { font-size: 18px; }
.stats-row {
display: grid !important;
grid-template-columns: 1fr 1fr 1fr;
gap: 4px;
width: 100%;
}
.stats-row .badge {
font-size: 15px;
padding: 6px 2px;
text-align: center;
margin: 0;
white-space: nowrap;
display: flex;
justify-content: center;
align-items: center;
}
.control-group { width: 100%; display: flex; justify-content: space-between; gap: 6px; }
.ctrl-item { flex: 1; flex-direction: row; align-items: center; justify-content: flex-start; }
.ctrl-item label { font-size: 15px; white-space: nowrap; }
.ctrl-item select { width: 100%; }
.btn-group { width: 100%; margin-top: 6px; gap: 6px; }
.s-start, .s-reset, .s-finish { padding: 10px 2px; font-size: 17px; flex: 1; white-space: nowrap; }
.s-finish { flex: 1.2; letter-spacing: -0.5px; }
}
</style>
</head>
<body>
<div class="wrap">
<div class="card">
<div class="title-row">
<h1>114(下)起信論期末考刷題小程序 <span class="sub">— 雲端版</span></h1>
<button class="btn-reload" onclick="forceReload()" title="檢查更新">↻</button>
</div>
</div>
<div class="card" id="panel-student">載入題庫中...</div>
</div>

<script>
const $ = s => document.querySelector(s);
const isArray = Array.isArray;

function normalize(a){ if(a==null) return []; return isArray(a)? [...a].sort((x,y)=>x-y) : [a]; }
function same(a,b){ a=normalize(a); b=normalize(b); return a.length===b.length && a.every((v,i)=>v===b[i]); }
function shuffle(arr){ return arr.map(v=>[Math.random(),v]).sort((a,b)=>a[0]-b[0]).map(x=>x[1]); }

// HTML 跳脫（避免題目/選項/解析中的特殊字元破壞版面）
function esc(s){
  return String(s==null?'':s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// 章節顯示：去掉開頭的編號（例：「08 心生滅門－2」→「心生滅門－2」）
// 只影響顯示，篩選仍用完整的 section 值
function sectionLabel(s){
  return String(s).replace(/^\d+(-\d+)?\s+/, '');
}

// 手機（窄螢幕）才自動捲動，減少上下滑動
const isMobile = () => window.matchMedia('(max-width:600px)').matches;
function scrollToQuestion(root){
  if(!isMobile()) return;
  const q = root.querySelector('.s-q');
  if(q) q.scrollIntoView({behavior:'smooth', block:'start'});
}
function scrollToAnswer(root){
  if(!isMobile()) return;
  const fb = root.querySelector('.s-fb');
  if(fb) fb.scrollIntoView({behavior:'smooth', block:'center'});
}
function scrollToNav(root){
  if(!isMobile()) return;
  const nav = root.querySelector('.s-nav');
  if(nav) nav.scrollIntoView({behavior:'smooth', block:'center'});
}

// 強制刷新函式
function forceReload() {
  if(confirm("確定要重新整理並檢查更新嗎？\n(將會清除當前作答進度)")) {
    window.location.reload();
  }
}

let BANK = [];

async function init(){
  try {
    const r = await fetch('questions.json', { cache: 'no-store' });
    if(!r.ok) throw new Error('讀取失敗');
    BANK = await r.json();
    mountStudent('#panel-student');
  } catch(e) {
    $('#panel-student').innerHTML = `<p style="color:red">無法讀取題庫，請確認 questions.json 是否已上傳。</p>`;
  }
}

function mountStudent(selector){
  const el = $(selector);
  el.innerHTML=`
<div class="row stats-row">
<div class="badge"><b class="s-total">${BANK.length}</b> 題</div>
<div class="badge">目前 <b class="s-progress">0/0</b></div>
<div class="badge">答對 <b class="s-right">0</b></div>
</div>
<div class="hr"></div>
<div class="row">
<div style="font-size:18px;font-weight:bold">1. 選擇章節：</div>
<div class="chips s-sections"></div>
</div>
<div class="row" style="margin-top:8px">
<div style="font-size:18px;font-weight:bold">2. 關鍵字搜尋：</div>
<input type="text" class="s-keyword" placeholder="輸入關鍵字 (題目或選項)...">
</div>
<div class="hr"></div>
<div class="row" style="flex-direction: column; align-items: stretch; gap: 8px;">
<div class="control-group">
<div class="ctrl-item">
<label>模式</label>
<select class="s-mode"><option value="order">依順序</option><option value="shuffle">隨機</option></select>
</div>
<div class="ctrl-item">
<label>題數</label>
<select class="s-count">
<option value="all" selected>全部</option>
<option value="10">10</option>
<option value="20">20</option>
<option value="50">50</option>
</select>
</div>
</div>
<div class="btn-group">
<button class="btn brand s-start">開始作答</button>
<button class="btn ghost s-reset">重置</button>
<button class="btn ghost s-finish">模擬測驗</button>
</div>
</div>
<div class="hr"></div>
<div class="question s-q">請選擇條件後，按「開始作答」</div>
<div class="s-optBox"></div>
<div class="feedback s-fb hidden">
<div class="s-fbTitle" style="font-weight:bold"></div>
<div class="s-fbAns"></div>
<div class="s-fbExp"></div>
</div>
<div class="nav hidden s-nav">
<button class="btn s-prev">← 上一題</button>
<button class="btn s-next">下一題 →</button>
</div>
<div class="report hidden s-report"></div>
`;

  const state = {paper:[], idx:0, right:0, user:{}, revealed:{}, firstScored:{}, examMode:false};
  el._state = state;

  const secs = [...new Set(BANK.map(q => q.section||'未分類'))];
  el.querySelector('.s-sections').innerHTML = secs.map(s => `
<label class="chip"><input type="checkbox" value="${esc(s)}" checked> ${esc(sectionLabel(s))}</label>
`).join('');

  el.querySelector('.s-start').onclick = () => start(el);
  el.querySelector('.s-reset').onclick = () => mountStudent(selector);
  el.querySelector('.s-finish').onclick = () => startExam(el);   // 模擬測驗
  el.querySelector('.s-prev').onclick = () => { if(state.idx>0){ state.idx--; render(el); } };
  el.querySelector('.s-next').onclick = () => {
    if(state.idx < state.paper.length-1){ state.idx++; render(el); }
    else { showReport(el); }
  };
}

// 隱藏並清空上一輪的成績報表與回饋（避免舊分數殘留）
function resetOutputs(root){
  const rep = root.querySelector('.s-report');
  rep.classList.add('hidden');
  rep.innerHTML = '';
  root.querySelector('.s-fb').classList.add('hidden');
}

// 一般練習：依章節/關鍵字/模式/題數作答，作答後顯示對錯與解析
function start(root){
  const st = root._state;
  const mode = root.querySelector('.s-mode').value;
  const wantStr = root.querySelector('.s-count').value;
  const keyword = root.querySelector('.s-keyword').value.trim().toLowerCase();
  const chosen = [...root.querySelectorAll('.s-sections input:checked')].map(i=>i.value);
  if(!chosen.length) return alert('請至少勾選一個章節');

  let pool = BANK.map((q,i)=>({q,i})).filter(x => chosen.includes(x.q.section||'未分類'));

  // 搜尋邏輯：題目 + 選項 (不含解析)
  if(keyword) {
    pool = pool.filter(item => {
      const qText = (item.q.question || "").toLowerCase();
      const optsText = (item.q.options || []).join(" ").toLowerCase();
      return qText.includes(keyword) || optsText.includes(keyword);
    });
  }

  const poolIdx = pool.map(x=>x.i);
  if(!poolIdx.length) {
    if(keyword) return alert(`在選定的章節中，找不到包含「${keyword}」的題目。`);
    return alert('所選章節目前沒有題目');
  }

  let list = (mode==='shuffle') ? shuffle(poolIdx) : poolIdx;
  const want = (wantStr==='all') ? list.length : Math.min(parseInt(wantStr), list.length);
  st.paper = list.slice(0, want);
  st.idx = 0; st.right = 0; st.user = {}; st.revealed = {}; st.firstScored = {};
  st.examMode = false;

  resetOutputs(root);                              // 開始作答即重置舊成績
  root.querySelector('.s-nav').classList.remove('hidden');
  render(root);
}

// 模擬測驗：全題庫隨機抽 25 是非題 + 25 選擇題，作答不顯示解析，答完出成績
function startExam(root){
  const st = root._state;

  const tfIdx = [];
  const mcIdx = [];
  BANK.forEach((q,i) => {
    const n = (q.options || []).length;
    if(n === 2) tfIdx.push(i); else mcIdx.push(i);
  });
  if(!tfIdx.length && !mcIdx.length) return alert('題庫是空的');

  const tfPick = shuffle(tfIdx).slice(0, Math.min(25, tfIdx.length));
  const mcPick = shuffle(mcIdx).slice(0, Math.min(25, mcIdx.length));

  if(tfPick.length < 25 || mcPick.length < 25){
    const ok = confirm(`題庫數量不足 25＋25（目前是非題 ${tfPick.length} 題、選擇題 ${mcPick.length} 題）。\n仍要以現有題數進行模擬測驗嗎？`);
    if(!ok) return;
  }

  st.paper = [...tfPick, ...mcPick];   // 是非題在前、選擇題在後
  st.idx = 0; st.right = 0; st.user = {}; st.revealed = {}; st.firstScored = {};
  st.examMode = true;

  resetOutputs(root);
  root.querySelector('.s-nav').classList.remove('hidden');
  render(root);
}

function render(root){
  const st = root._state;
  const pi = st.paper[st.idx];
  const q = BANK[pi];

  root.querySelector('.s-progress').textContent = `${st.idx+1}/${st.paper.length}`;
  root.querySelector('.s-right').textContent = st.examMode ? '—' : st.right;  // 模擬測驗不即時顯示答對數
  root.querySelector('.s-q').textContent = q.question;

  const box = root.querySelector('.s-optBox');
  box.innerHTML = '';

  const correct = normalize(q.answer);
  const isMulti = correct.length > 1;
  const cur = normalize(st.user[pi]);
  const locked = !!st.revealed[pi];   // 已作答 → 鎖定，不可再改

  (q.options||[]).forEach((opt, i) => {
    const row = document.createElement('label');
    row.className = 'opt' + (locked ? ' locked' : '');

    const ip = document.createElement('input');
    ip.type = isMulti ? 'checkbox' : 'radio';
    ip.name = 'q_opt';
    ip.checked = cur.includes(i);
    ip.disabled = locked;

    row.onclick = (e) => {
      if(st.revealed[pi]) return;   // 已作答 → 鎖定，一律忽略後續點擊
      if(e.target !== ip) ip.checked = !ip.checked;

      let now = new Set(normalize(st.user[pi]));
      if(isMulti){
        if(ip.checked) now.add(i); else now.delete(i);
      } else {
        now = new Set([i]);
        box.querySelectorAll('input').forEach((inp, idx) => { if(idx!==i) inp.checked=false; });
      }
      st.user[pi] = [...now].sort((a,b)=>a-b);

      // 單選：一選即定案；多選：選滿正解數量即定案
      if(!isMulti || st.user[pi].length >= correct.length){
        st.revealed[pi] = true;
        // 一般練習才即時計分並更新答對數；模擬測驗於交卷時才結算
        if(!st.examMode && same(st.user[pi], q.answer) && !st.firstScored[pi]){
          st.right++; st.firstScored[pi]=true;
          root.querySelector('.s-right').textContent = st.right;
        }
        // 鎖定本題所有選項，之後不可修改
        box.querySelectorAll('input').forEach(inp => inp.disabled = true);
        box.querySelectorAll('.opt').forEach(o => o.classList.add('locked'));
        refreshUI(root, q, pi);
        // 手機自動捲動：練習→捲到解答；模擬測驗→捲到下一題按鈕
        if(st.examMode) scrollToNav(root); else scrollToAnswer(root);
      }
    };

    row.append(ip, document.createTextNode(" " + opt));
    box.append(row);
  });

  refreshUI(root, q, pi);
  scrollToQuestion(root);   // 手機：換題後自動捲到題目
}

function refreshUI(root, q, pi){
  const st = root._state;
  const fb = root.querySelector('.s-fb');

  // 模擬測驗：作答過程一律不顯示對錯與解析
  if(st.examMode){
    fb.classList.add('hidden');
    return;
  }

  const isRev = st.revealed[pi];
  const uAns = normalize(st.user[pi]);
  const correct = normalize(q.answer);
  const ok = same(uAns, q.answer);

  if(isRev){
    fb.classList.remove('hidden');
    fb.className = `feedback s-fb ${ok?'ok':'bad'}`;
    root.querySelector('.s-fbTitle').textContent = ok ? '答對了 ✅' : '答錯了 ❌';
    const ansText = correct.map(i => (q.options && q.options[i]) ? q.options[i] : ['A','B','C','D'][i]).join(', ');
    root.querySelector('.s-fbAns').textContent = '正確答案：' + ansText;
    root.querySelector('.s-fbExp').textContent = q.explanation ? '解析：' + q.explanation : '';
    root.querySelectorAll('.opt').forEach((row, i) => {
      row.classList.remove('correct','wrong');
      if(correct.includes(i)) row.classList.add('correct');
      else if(uAns.includes(i)) row.classList.add('wrong');
    });
  } else {
    fb.classList.add('hidden');
  }
}

function showReport(root){
  const st = root._state;
  const box = root.querySelector('.s-report');
  box.classList.remove('hidden');

  const total = st.paper.length;
  const correctCount = st.paper.filter(pi => same(st.user[pi], BANK[pi].answer)).length;
  const wrongList = st.paper.filter(pi => !same(st.user[pi], BANK[pi].answer));
  const heading = st.examMode ? '模擬測驗結果' : '本次練習已完成';

  box.innerHTML = `
<h2 style="color:#3b82f6; margin-top:0">${heading}</h2>
<div style="margin-bottom:15px; font-size:18px;">
<span class="chip">答對：${correctCount} / ${total}</span>
<span class="chip">正確率：${total > 0 ? Math.round(correctCount/total*100) : 0}%</span>
</div>
${wrongList.length===0 ? '<p style="font-size:20px; color:#16a34a">全對！太棒了 🎉</p>' :
`<details open><summary>錯題清單 (${wrongList.length})</summary>
<ul>${wrongList.map(pi => {
  const q = BANK[pi];
  const ansText = normalize(q.answer).map(i => (q.options && q.options[i]) ? q.options[i] : ['A','B','C','D'][i]).join(', ');
  return `<li style="margin-bottom:14px">
<b>${esc(q.question)}</b><br>
<span style="color:#16a34a">正解：${esc(ansText)}</span><br>
<span class="exp">解析：${esc(q.explanation||'無')}</span>
</li>`;
}).join('')}</ul></details>`
}
<div style="margin-top:20px">
<button class="btn brand" onclick="mountStudent('#panel-student')">再練習一次</button>
</div>
`;

  root.querySelector('.s-nav').classList.add('hidden');
  root.querySelector('.s-optBox').innerHTML = '';
  root.querySelector('.s-q').textContent = '';
}

init();

// 註冊 Service Worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js')
    .then(reg => console.log('SW registered!', reg))
    .catch(err => console.log('SW failed', err));
}
</script>
</body>
</html>
